<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷 PorciSoft Pro - Gestión de Granjas Porcinas</title>
    
    <!-- Hojas de estilo (rutas relativas a la carpeta app) -->
    <link rel="stylesheet" href="app/css/style.css">
    <link rel="stylesheet" href="app/css/menu.css">
    <link rel="stylesheet" href="app/css/forms.css">
    <link rel="stylesheet" href="app/css/tables.css">
    <link rel="stylesheet" href="app/css/dashboard.css">
    
    <!-- Chart.js desde CDN (necesario para los gráficos) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐷</text></svg>">
</head>
<body>
    <!-- ==================== BARRA SUPERIOR ==================== -->
    <header id="topBar" class="top-bar">
        <div class="top-bar-left">
            <button id="toggleMenu" class="btn-icon" title="Menú lateral">☰</button>
            <span class="app-title">🐷 PorciSoft Pro</span>
        </div>
        <div class="top-bar-center">
            <input type="text" id="globalSearch" class="global-search" placeholder="🔍 Buscar animales, cerdas, verracos... (Ctrl+F)">
        </div>
        <div class="top-bar-right">
            <span id="clock" class="clock">00:00</span>
            <button id="btnTheme" class="btn-icon" title="Cambiar tema claro/oscuro">🌙</button>
            <button id="btnQuickBackup" class="btn-icon" title="Respaldo rápido (Ctrl+B)">💾</button>
            <span class="user-badge">👤 Administrador</span>
        </div>
    </header>

    <!-- ==================== MENÚ LATERAL ==================== -->
    <nav id="sideMenu" class="side-menu open">
        <ul id="menuList" class="menu-list">
            <!-- Se llena con menu.js -->
        </ul>
    </nav>

    <!-- ==================== ÁREA PRINCIPAL ==================== -->
    <main id="mainContent" class="main-content">
        <div id="moduleContainer" class="module-container">
            <p style="text-align:center; margin-top:40px;">Cargando aplicación...</p>
        </div>
    </main>

    <!-- ==================== MODAL GENÉRICO ==================== -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-window">
            <div class="modal-header">
                <h3 id="modalTitle">Título</h3>
                <button class="btn-icon modal-close" onclick="window.closeModal()">✕</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="window.closeModal()">Cancelar</button>
                <button id="modalConfirmBtn" class="btn btn-primary">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- ==================== NOTIFICACIONES TOAST ==================== -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- ==================== SCRIPTS ==================== -->
    <script>
        // Función global para cerrar modal
        window.closeModal = function() {
            const overlay = document.getElementById('modalOverlay');
            if (overlay) overlay.classList.add('hidden');
        };
    </script>
    
    <!-- Script principal (módulo ES6) cargado desde la carpeta app -->
    <script type="module" src="app/js/main.js"></script>
</body>
</html>
